name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_generator: TGZ
            artifact_suffix: ubuntu
            configure_args: ""
          - os: windows-latest
            toolchain: msvc
            package_generator: ZIP
            artifact_suffix: windows-msvc
            configure_args: ""
          - os: macos-latest
            package_generator: TGZ
            artifact_suffix: macos
            configure_args: ""
          - os: windows-latest
            toolchain: mingw
            package_generator: ZIP
            artifact_suffix: windows-mingw
            configure_args: "-DCMAKE_C_COMPILER=C:/mingw64/bin/gcc.exe"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Set up MSVC toolchain
        if: matrix.toolchain == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DFEX_WARNINGS_AS_ERRORS=ON ${{ matrix.configure_args }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Install
        run: cmake --install build --prefix install-root

      - name: Verify install layout
        run: python tools/check_install_layout.py --prefix install-root

      - name: CMake package smoke test
        run: |
          cmake -S tools/install_smoke -B install-smoke -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install-root"
          cmake --build install-smoke

      - name: Package
        run: cpack --config build/CPackConfig.cmake -G ${{ matrix.package_generator }} -B dist

      - name: Verify package output
        run: python tools/check_install_layout.py --prefix install-root --dist dist

      - name: Remove CPack staging directory
        run: python -c "import shutil; shutil.rmtree('dist/_CPack_Packages', ignore_errors=True)"

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: fex-package-${{ matrix.artifact_suffix }}
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.tgz
          if-no-files-found: error

  sanitizers:
    runs-on: ubuntu-latest

    env:
      ASAN_OPTIONS: detect_leaks=1
      UBSAN_OPTIONS: print_stacktrace=1

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Configure
        run: cmake -S . -B build-sanitize -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DFEX_ENABLE_SANITIZERS=ON -DFEX_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build-sanitize

      - name: Test
        run: ctest --test-dir build-sanitize --output-on-failure

