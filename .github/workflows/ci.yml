name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_generator: TGZ
            artifact_suffix: ubuntu
            cmake_generator: Ninja
            cmake_generator_args: ""
            cmake_build_type_arg: -DCMAKE_BUILD_TYPE=Release
            build_config_args: ""
            test_config_args: ""
            install_config_args: ""
            package_config_args: ""
            smoke_cmake_generator: Ninja
            smoke_cmake_generator_args: ""
            smoke_cmake_build_type_arg: -DCMAKE_BUILD_TYPE=Release
            smoke_build_config_args: ""
            configure_args: ""
          - os: windows-latest
            toolchain: msvc
            package_generator: ZIP
            artifact_suffix: windows-msvc
            cmake_generator: "Visual Studio 17 2022"
            cmake_generator_args: -A x64
            cmake_build_type_arg: ""
            build_config_args: --config Release
            test_config_args: -C Release
            install_config_args: --config Release
            package_config_args: -C Release
            smoke_cmake_generator: "Visual Studio 17 2022"
            smoke_cmake_generator_args: -A x64
            smoke_cmake_build_type_arg: ""
            smoke_build_config_args: --config Release
            configure_args: ""
          - os: macos-latest
            package_generator: TGZ
            artifact_suffix: macos
            cmake_generator: Ninja
            cmake_generator_args: ""
            cmake_build_type_arg: -DCMAKE_BUILD_TYPE=Release
            build_config_args: ""
            test_config_args: ""
            install_config_args: ""
            package_config_args: ""
            smoke_cmake_generator: Ninja
            smoke_cmake_generator_args: ""
            smoke_cmake_build_type_arg: -DCMAKE_BUILD_TYPE=Release
            smoke_build_config_args: ""
            configure_args: ""
          - os: windows-latest
            toolchain: mingw
            package_generator: ZIP
            artifact_suffix: windows-mingw
            cmake_generator: Ninja
            cmake_generator_args: ""
            cmake_build_type_arg: -DCMAKE_BUILD_TYPE=Release
            build_config_args: ""
            test_config_args: ""
            install_config_args: ""
            package_config_args: ""
            smoke_cmake_generator: Ninja
            smoke_cmake_generator_args: ""
            smoke_cmake_build_type_arg: -DCMAKE_BUILD_TYPE=Release
            smoke_build_config_args: ""
            configure_args: "-DCMAKE_C_COMPILER=C:/mingw64/bin/gcc.exe"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Configure
        run: cmake -S . -B build -G "${{ matrix.cmake_generator }}" ${{ matrix.cmake_generator_args }} ${{ matrix.cmake_build_type_arg }} -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DFEX_WARNINGS_AS_ERRORS=ON ${{ matrix.configure_args }}

      - name: Build
        run: cmake --build build ${{ matrix.build_config_args }}

      - name: Test
        run: ctest --test-dir build --output-on-failure ${{ matrix.test_config_args }}

      - name: Install
        run: cmake --install build --prefix install-root ${{ matrix.install_config_args }}

      - name: Verify install layout
        run: python tools/check_install_layout.py --prefix install-root

      - name: CMake package smoke test
        run: |
          cmake -S tools/install_smoke -B install-smoke -G "${{ matrix.smoke_cmake_generator }}" ${{ matrix.smoke_cmake_generator_args }} ${{ matrix.smoke_cmake_build_type_arg }} -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install-root"
          cmake --build install-smoke ${{ matrix.smoke_build_config_args }}

      - name: Package
        run: cpack --config build/CPackConfig.cmake ${{ matrix.package_config_args }} -G ${{ matrix.package_generator }} -B dist

      - name: Verify package output
        run: python tools/check_install_layout.py --prefix install-root --dist dist

      - name: Remove CPack staging directory
        run: python -c "import shutil; shutil.rmtree('dist/_CPack_Packages', ignore_errors=True)"

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: fex-package-${{ matrix.artifact_suffix }}
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.tgz
          if-no-files-found: error

  sanitizers:
    runs-on: ubuntu-latest

    env:
      ASAN_OPTIONS: detect_leaks=1
      UBSAN_OPTIONS: print_stacktrace=1

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Configure
        run: cmake -S . -B build-sanitize -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DFEX_ENABLE_SANITIZERS=ON -DFEX_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build-sanitize

      - name: Test
        run: ctest --test-dir build-sanitize --output-on-failure

