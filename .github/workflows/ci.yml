name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_generator: TGZ
          - os: windows-latest
            package_generator: ZIP
          - os: macos-latest
            package_generator: TGZ

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DFEX_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Install
        run: cmake --install build --prefix install-root

      - name: Verify install layout
        run: python tools/check_install_layout.py --prefix install-root

      - name: CMake package smoke test
        run: |
          cmake -S tools/install_smoke -B install-smoke -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install-root"
          cmake --build install-smoke

      - name: Package
        run: cpack --config build/CPackConfig.cmake -G ${{ matrix.package_generator }} -B dist

      - name: Verify package output
        run: python tools/check_install_layout.py --prefix install-root --dist dist

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: fex-package-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  sanitizers:
    runs-on: ubuntu-latest

    env:
      ASAN_OPTIONS: detect_leaks=1
      UBSAN_OPTIONS: print_stacktrace=1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure
        run: cmake -S . -B build-sanitize -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DFEX_ENABLE_SANITIZERS=ON -DFEX_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build-sanitize

      - name: Test
        run: ctest --test-dir build-sanitize --output-on-failure

